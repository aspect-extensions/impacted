on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - edited
      - synchronize
  schedule:
    - cron: '0 6 * * *'

jobs:
  org-checks:
    uses: aspect-extensions/.github/.github/workflows/org-check.yaml@main
    secrets: inherit
    permissions:
      contents: read
      pull-requests: write
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        aspect-version:
          - '' # latest prerelease
          - v2025.46.20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: bazel-contrib/setup-bazel@0.18.0
      - uses: aspect-extensions/.github/.github/actions/setup-aspect-cli@main
        with:
          version: ${{ matrix.aspect-version }}
      - name: Test
        working-directory: example
        shell: sh
        run: $GITHUB_WORKSPACE/example/README.md || exit 1
